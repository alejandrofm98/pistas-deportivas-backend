server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  application:
    name: pistas-deportivas-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sportreserve}
    username: ${SPRING_DATASOURCE_USERNAME:sportreserve}
    password: ${SPRING_DATASOURCE_PASSWORD:sportreserve_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_USERNAME:false}
          starttls:
            enable: ${MAIL_USERNAME:false}

app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}
  jwt:
    secret: ${JWT_SECRET:base64-encoded-256-bit-secret-for-jwt-signing-at-least-32-chars}
    expiration-ms: 86400000
  redsys:
    merchant-code: ${REDSYS_MERCHANT_CODE:999008881}
    terminal: ${REDSYS_TERMINAL:1}
    secret-key: ${REDSYS_SECRET_KEY:sq7HjrUOBfKmC576ILgskD5srU870gJ7}
    url: ${REDSYS_URL:https://sis-t.redsys.es:25443/sis/realizarPago}
    merchant-name: PistasDeportivas
    merchant-return-url: ${APP_URL:http://localhost:4200}/payment/result
    notify-url: ${API_URL:http://localhost:8080}/api/payments/notify
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  brevo:
    api-key: ${BREVO_API_KEY:}
    sender-name: Pistas El Valle
    sender-email: ${BREVO_SENDER_EMAIL:}

logging:
  level:
    com.sportreserve: DEBUG
    org.springframework.security: INFO
